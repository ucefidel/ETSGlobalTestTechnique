services:
  mongodb:
    image: mongo:7
    container_name: ets_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ets_global

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: ets_backend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      #- /var/www/html/vendor
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: ets_global
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ets_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  mongodb_data:
